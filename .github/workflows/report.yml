name: MD report (weekly)

on:
  schedule:
    - cron: "30 5 * * 1"   # Mondays 05:30 UTC — ~1h after the scrape
  workflow_dispatch:
    inputs:
      days:
        description: "How many days back to report on"
        default: "7"

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Build & email report
        env:
          REPORT_SOURCE: r2
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
        run: |
          DAYS="${{ github.event.inputs.days }}"; DAYS="${DAYS:-7}"
          python -m garminscrap.cli report --days "$DAYS"
