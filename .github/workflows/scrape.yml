name: Scrape Garmin (daily)

on:
  schedule:
    - cron: "30 4 * * *"   # daily 04:30 UTC — after midnight in Europe/Prague
  workflow_dispatch:
    inputs:
      date:
        description: "Date to scrape (YYYY-MM-DD). Blank = yesterday."
        required: false

env:
  TZ: Europe/Prague       # used to compute "yesterday"; change to your timezone

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Scrape previous day -> R2
        env:
          GARMIN_TOKEN_B64: ${{ secrets.GARMIN_TOKEN_B64 }}
          STORAGE_BACKEND: r2
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          DATE="${{ github.event.inputs.date }}"
          if [ -z "$DATE" ]; then DATE=$(date -d yesterday +%F); fi
          echo "Scraping $DATE"
          python -m garminscrap.cli scrape --date "$DATE" --full
