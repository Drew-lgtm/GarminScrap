name: Scrape Garmin (weekly)

on:
  schedule:
    - cron: "30 4 * * 1"   # Mondays 04:30 UTC (early morning in Europe/Prague)
  workflow_dispatch:
    inputs:
      date:
        description: "Single date to scrape (YYYY-MM-DD). Blank = last ~10 days."
        required: false

env:
  TZ: Europe/Prague       # used to compute dates; change to your timezone

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Scrape -> R2
        env:
          GARMIN_TOKEN_B64: ${{ secrets.GARMIN_TOKEN_B64 }}
          STORAGE_BACKEND: r2
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          DATE="${{ github.event.inputs.date }}"
          if [ -n "$DATE" ]; then
            echo "Scraping single date $DATE"
            python -m garminscrap.cli scrape --date "$DATE" --full
          else
            END=$(date -d yesterday +%F)
            START=$(date -d '10 days ago' +%F)
            echo "Scraping $START .. $END"
            python -m garminscrap.cli scrape --start "$START" --end "$END" --full
          fi
